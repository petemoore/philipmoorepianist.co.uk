<div class="video-section">
<div class="video-embed">
  <iframe src="https://www.youtube.com/embed/{{ include.id }}{% if include.start %}?start={{ include.start }}{% endif %}" title="{{ include.title | default: 'Video' }}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
</div>
{% if include.caption %}<p class="video-caption">{{ include.caption }}</p>{% endif %}
</div>
